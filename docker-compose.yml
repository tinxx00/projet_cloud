# Stack complète : Kafka + Producer + Consumer + Dashboard + Worker d'alertes.
# Lancement en une seule commande :  docker compose up -d --build
# (nécessite un fichier .env — copier .env.example et renseigner FINNHUB_API_KEY)

# Config commune aux services Python de l'application (image construite une fois)
x-app: &app
  build: .
  image: marketpilot-app
  env_file:
    - .env
  environment:
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  volumes:
    - ./data:/app/data
  depends_on:
    - kafka
  restart: unless-stopped

services:
  # ── Infrastructure Kafka ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── Application ─────────────────────────────────────────────────────────
  producer:
    <<: *app
    container_name: mp-producer
    command: python -m producer.main

  consumer:
    <<: *app
    container_name: mp-consumer
    command: python -m consumer.main

  dashboard:
    <<: *app
    container_name: mp-dashboard
    ports:
      - "8501:8501"
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

  worker:
    <<: *app
    container_name: mp-worker
    command: python -m alert_worker
