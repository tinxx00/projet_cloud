name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + Build Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vérification de la syntaxe Python
        run: python -m compileall src deploy scripts

      - name: Préparer un .env de test
        run: cp .env.example .env

      - name: Valider le docker-compose
        run: docker compose config --quiet

      - name: Build de l'image Docker
        run: docker build -t marketpilot-app:ci .
